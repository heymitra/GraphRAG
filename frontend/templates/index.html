<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GraphRAG Explorer</title>
  <meta name="description" content="Upload a PDF to extract a knowledge graph and explore entities, communities and relationships." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=2" />
</head>
<body>

  <!-- ── Top bar ────────────────────────────────────────────────── -->
  <header class="topbar">
    <div class="logo">
      <div class="logo-icon">🕸</div>
      GraphRAG Explorer
    </div>
    
    <div class="spacer"></div>
    <span class="status-pill idle" id="statusPill"><span class="dot"></span> <span id="statusLabel">Idle</span></span>
    
    <select class="filter-select" id="globalDocFilter" style="margin-right:12px; max-width:250px;">
      <option value="">All Documents</option>
    </select>
    
    <button class="topbar-btn" id="deleteDocBtn" style="color: #ef4444; border: 1px solid rgba(239,68,68,0.5); display:none; margin-right:12px;">
      🗑 Delete File
    </button>
    
    <button class="topbar-btn primary" id="openUploadModal">⬆ Upload PDF</button>
    <a href="http://localhost:7475" target="_blank" class="topbar-btn">Open Neo4j ↗</a>
  </header>

  <!-- ── Tab bar ────────────────────────────────────────────────── -->
  <nav class="tab-bar">
    <button class="tab-btn active" data-tab="entities">
      Entities <span class="tab-count" id="count-entities">—</span>
    </button>
    <button class="tab-btn" data-tab="relationships">
      Relationships <span class="tab-count" id="count-relationships">—</span>
    </button>
    <button class="tab-btn" data-tab="claims">
      Claims <span class="tab-count" id="count-claims">—</span>
    </button>
    <button class="tab-btn" data-tab="communities">
      Communities <span class="tab-count" id="count-communities">—</span>
    </button>
  </nav>

  <!-- ── Main content ───────────────────────────────────────────── -->
  <main class="main">

    <!-- Entities tab -->
    <div class="tab-panel active" id="tab-entities">
      <div class="empty" id="entitiesEmpty">
        <span class="big">🔍</span>
        Upload a PDF to extract entities.
      </div>
      <div id="entitiesContent" style="display:none;">
        <div class="controls-row">
          <input class="search-box" id="entitySearch" placeholder="Search by name or description…" />
          <select class="filter-select" id="typeFilter">
            <option value="">All Types</option>
          </select>
        </div>
        <table class="data-table">
          <thead><tr><th>Name</th><th>Type</th><th>Degree</th><th>Description</th></tr></thead>
          <tbody id="entityBody"></tbody>
        </table>
      </div>
    </div>

    <!-- Relationships tab -->
    <div class="tab-panel" id="tab-relationships">
      <div class="empty" id="relsEmpty">
        <span class="big">🔗</span>
        No relationships yet.
      </div>
      <div id="relsContent" style="display:none;">
        <input class="search-box" id="relSearch" placeholder="Search by entity or description…" />
        <div id="relList"></div>
      </div>
    </div>

    <!-- Claims tab -->
    <div class="tab-panel" id="tab-claims">
      <div class="empty" id="claimsEmpty">
        <span class="big">⚖️</span>
        No claims extracted yet.
      </div>
      <div id="claimsContent" style="display:none;">
        <input class="search-box" id="claimSearch" placeholder="Search claims…" />
        <table class="data-table">
          <thead>
            <tr>
              <th style="width:12%;">Type</th>
              <th style="width:20%;">Subject</th>
              <th style="width:20%;">Object</th>
              <th style="width:12%;">Status</th>
              <th style="width:36%;">Description</th>
            </tr>
          </thead>
          <tbody id="claimBody"></tbody>
        </table>
      </div>
    </div>

    <!-- Communities tab -->
    <div class="tab-panel" id="tab-communities">
      <div class="empty" id="commEmpty">
        <span class="big">🏘</span>
        No communities yet.
      </div>
      <div id="commContent" style="display:none;">
        <div class="comm-grid" id="commList"></div>
      </div>
    </div>

  </main>

  <!-- ── Upload modal ───────────────────────────────────────────── -->
  <div class="modal-overlay" id="uploadModal">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">Upload PDF</div>
        <button class="modal-close" id="closeModal">✕</button>
      </div>

      <div class="drop-zone" id="dropZone">
        <div class="dz-icon">📄</div>
        <p>Drag & drop a PDF here, or <span id="browseBtn">browse files</span></p>
        <p id="modalFileName"></p>
      </div>
      <input type="file" id="fileInput" accept="application/pdf" />
      <button class="btn btn-primary" id="uploadBtn" disabled style="margin-top: 14px;">⚡ Upload &amp; Process</button>
      <div class="log-box" id="logBox"></div>
    </div>
  </div>

<script>
/* ── Tabs ──────────────────────────────────────────────────────── */
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
  });
});

/* ── Modal open/close ──────────────────────────────────────────── */
const modal = document.getElementById('uploadModal');
document.getElementById('openUploadModal').addEventListener('click', () => modal.classList.add('open'));
document.getElementById('closeModal').addEventListener('click', closeModal);
modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
function closeModal() {
  if (pipeline_running) return;   // don't close while running
  modal.classList.remove('open');
}

/* ── File drop/select ──────────────────────────────────────────── */
const dropZone   = document.getElementById('dropZone');
const fileInput  = document.getElementById('fileInput');
const uploadBtn  = document.getElementById('uploadBtn');
const fileNameEl = document.getElementById('modalFileName');
let selectedFile = null;

document.getElementById('browseBtn').addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', () => handleFile(fileInput.files[0]));
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  if (f && f.type === 'application/pdf') handleFile(f);
});

function handleFile(f) {
  if (!f) return;
  selectedFile = f;
  fileNameEl.textContent = f.name;
  fileNameEl.style.display = 'block';
  uploadBtn.disabled = false;
}

/* ── Upload ────────────────────────────────────────────────────── */
let pipeline_running = false;

uploadBtn.addEventListener('click', async () => {
  if (!selectedFile) return;
  uploadBtn.disabled = true;
  pipeline_running = true;
  document.getElementById('logBox').innerHTML = '';
  document.getElementById('logBox').style.display = 'block';
  const fd = new FormData();
  fd.append('pdf', selectedFile);
  const res  = await fetch('/upload', { method: 'POST', body: fd });
  const json = await res.json();
  if (json.error) {
    alert(json.error);
    uploadBtn.disabled = false;
    pipeline_running = false;
    return;
  }
  startPolling();
});

/* ── Status polling ────────────────────────────────────────────── */
let pollTimer = null;
let lastLogLen = 0;

function startPolling() {
  clearInterval(pollTimer);
  lastLogLen = 0;
  pollTimer = setInterval(pollStatus, 1500);
  pollStatus();
}

async function pollStatus() {
  const res  = await fetch('/api/status');
  const data = await res.json();
  updateStatusUI(data);
  if (data.status === 'done') {
    clearInterval(pollTimer);
    pipeline_running = false;
    uploadBtn.disabled = false;
    loadData();
  } else if (data.status === 'error') {
    clearInterval(pollTimer);
    pipeline_running = false;
    uploadBtn.disabled = false;
  }
}

function updateStatusUI(data) {
  const pill  = document.getElementById('statusPill');
  const label = document.getElementById('statusLabel');
  const logBox = document.getElementById('logBox');

  pill.className = 'status-pill ' + data.status;
  const dot = data.status === 'running'
    ? '<span class="dot pulse"></span>'
    : '<span class="dot"></span>';
  const labelMap = { idle: 'Idle', running: data.stage || 'Running…', done: 'Complete', error: 'Error' };
  pill.innerHTML = dot + ' <span id="statusLabel">' + (labelMap[data.status] || data.status) + '</span>';

  // Append new log lines
  if (data.log && data.log.length > lastLogLen) {
    const newLines = data.log.slice(lastLogLen);
    lastLogLen = data.log.length;
    newLines.forEach(line => {
      const p = document.createElement('p');
      p.textContent = line;
      if (line.startsWith('❌') || line.toLowerCase().includes('error')) p.classList.add('error-line');
      logBox.appendChild(p);
    });
    logBox.scrollTop = logBox.scrollHeight;
  }
}

let allDocuments = [];

/* ── Load data from Neo4j API ──────────────────────────────────── */
async function loadData() {
  try {
    const res  = await fetch('/api/data');
    const data = await res.json();
    if (data.error) return;
    
    // Setup documents filter
    allDocuments = data.documents || [];
    const docSelect = document.getElementById('globalDocFilter');
    // keep selected value
    const currentDoc = docSelect.value;
    docSelect.innerHTML = '<option value="">All Documents</option>';
    allDocuments.forEach(doc => {
      const opt = document.createElement('option');
      opt.value = doc.id;
      // use filename if title is just generic
      let displayTitle = doc.title || 'Unknown Document';
      if(displayTitle.length > 30) displayTitle = displayTitle.substring(0, 27) + '...';
      opt.textContent = displayTitle;
      docSelect.appendChild(opt);
    });
    if (currentDoc) docSelect.value = currentDoc;

    renderEntities(data.entities);
    renderRelationships(data.relationships);
    renderClaims(data.claims);
    renderCommunities(data.communities);
  } catch(e) { /* Neo4j offline */ }
}

document.getElementById('globalDocFilter').addEventListener('change', () => {
  const val = document.getElementById('globalDocFilter').value;
  document.getElementById('deleteDocBtn').style.display = val ? 'inline-block' : 'none';
  filterEntities();
  filterRelationships();
  filterClaims();
});

document.getElementById('deleteDocBtn').addEventListener('click', async () => {
  const docId = document.getElementById('globalDocFilter').value;
  if (!docId) return;
  if (!confirm("Are you sure you want to delete this document? It will be removed from Neo4j and the local filesystem.")) return;
  
  const btn = document.getElementById('deleteDocBtn');
  btn.disabled = true;
  btn.textContent = 'Deleting...';
  
  try {
    const res = await fetch(`/api/documents/${docId}`, { method: 'DELETE' });
    const json = await res.json();
    if (json.ok) {
       document.getElementById('globalDocFilter').value = "";
       document.getElementById('deleteDocBtn').style.display = "none";
       // Reload data fully from Neo4j
       await loadData();
    } else {
       alert(json.error || "Failed to delete document.");
    }
  } catch (e) {
    alert("Error communicating with server.");
  } finally {
    btn.disabled = false;
    btn.textContent = '🗑 Delete File';
  }
});

/* ── Tab counts helper ─────────────────────────────────────────── */

function setCount(tabKey, n) {
  const el = document.getElementById('count-' + tabKey);
  if (el) el.textContent = n > 0 ? n : '—';
}

/* ── Entities ─────────────────────────────────────────────────── */
let allEntities = [];
function renderEntities(entities) {
  allEntities = entities || [];
  setCount('entities', allEntities.length);
  const empty   = document.getElementById('entitiesEmpty');
  const content = document.getElementById('entitiesContent');
  if (!allEntities.length) { empty.style.display=''; content.style.display='none'; return; }
  empty.style.display = 'none'; content.style.display = 'block';
  
  // Populate type filter
  const typeFilter = document.getElementById('typeFilter');
  const types = [...new Set(allEntities.map(e => e.type))].filter(Boolean).sort();
  typeFilter.innerHTML = '<option value="">All Types</option>';
  types.forEach(t => {
    const opt = document.createElement('option');
    opt.value = t;
    opt.textContent = t;
    typeFilter.appendChild(opt);
  });

  drawEntityTable(allEntities);
}
function drawEntityTable(list) {
  const tbody = document.getElementById('entityBody');
  tbody.innerHTML = '';
  list.forEach(e => {
    const tr  = document.createElement('tr');
    const type = (e.type || '').toLowerCase();
    tr.innerHTML = `
      <td style="font-weight:600;">${esc(e.name)}</td>
      <td><span class="badge ${type}">${esc(e.type || '—')}</span></td>
      <td>${e.degree ?? '—'}</td>
      <td style="color:var(--text-muted);font-size:0.78rem;">${esc(e.description || '')}</td>`;
    tbody.appendChild(tr);
  });
}

function filterEntities() {
  const q = document.getElementById('entitySearch').value.toLowerCase();
  const typeSelection = document.getElementById('typeFilter').value;
  const docSelection = document.getElementById('globalDocFilter').value;
  
  const filtered = allEntities.filter(e => {
    const matchesSearch = (e.name||'').toLowerCase().includes(q) || (e.description||'').toLowerCase().includes(q);
    const matchesType = !typeSelection || e.type === typeSelection;
    const matchesDoc = !docSelection || (e.document_ids && e.document_ids.includes(docSelection));
    return matchesSearch && matchesType && matchesDoc;
  });
  
  setCount('entities', filtered.length);
  drawEntityTable(filtered);
}

document.getElementById('entitySearch').addEventListener('input', filterEntities);
document.getElementById('typeFilter').addEventListener('change', filterEntities);

/* ── Relationships ────────────────────────────────────────────── */
let allRels = [];
function renderRelationships(rels) {
  allRels = rels || [];
  setCount('relationships', allRels.length);
  const empty   = document.getElementById('relsEmpty');
  const content = document.getElementById('relsContent');
  if (!allRels.length) { empty.style.display=''; content.style.display='none'; return; }
  empty.style.display = 'none'; content.style.display = 'block';
  drawRelList(allRels);
}
function drawRelList(list) {
  const el = document.getElementById('relList');
  el.innerHTML = '';
  list.forEach(r => {
    const div = document.createElement('div');
    div.className = 'rel-row';
    div.innerHTML = `
      <div class="rel-source">${esc(r.source)}</div>
      <div class="rel-arrow">→</div>
      <div class="rel-target">${esc(r.target)}</div>
      <div class="rel-desc">${esc(r.description || '')}</div>`;
    el.appendChild(div);
  });
}
function filterRelationships() {
  const q = document.getElementById('relSearch').value.toLowerCase();
  const docSelection = document.getElementById('globalDocFilter').value;
  
  // To verify relations correctly we'd map relation -> documents.
  // For UI responsiveness, since we didn't fetch documents for edges, 
  // we could check if either source or target matches the doc filter.
  // This is a rough filter purely on the UI side.
  let activeEntities = new Set();
  if (docSelection) {
     allEntities.forEach(e => {
       if (e.document_ids && e.document_ids.includes(docSelection)) {
         activeEntities.add(e.name);
       }
     });
  }

  const filtered = allRels.filter(r => {
    const matchesSearch = (r.source||'').toLowerCase().includes(q) ||
                          (r.target||'').toLowerCase().includes(q) ||
                          (r.description||'').toLowerCase().includes(q);
    const matchesDoc = !docSelection || activeEntities.has(r.source) || activeEntities.has(r.target);
    return matchesSearch && matchesDoc;
  });

  setCount('relationships', filtered.length);
  drawRelList(filtered);
}

document.getElementById('relSearch').addEventListener('input', filterRelationships);

/* ── Claims ───────────────────────────────────────────────────── */
let allClaims = [];
function renderClaims(claims) {
  allClaims = claims || [];
  setCount('claims', allClaims.length);
  const empty   = document.getElementById('claimsEmpty');
  const content = document.getElementById('claimsContent');
  if (!allClaims.length) { empty.style.display=''; content.style.display='none'; return; }
  empty.style.display = 'none'; content.style.display = 'block';
  drawClaimTable(allClaims);
}
function drawClaimTable(list) {
  const tbody = document.getElementById('claimBody');
  tbody.innerHTML = '';
  list.forEach(c => {
    const tr = document.createElement('tr');
    const status = (c.status || '').toLowerCase();
    const statusClass = status ? `status-${status}` : '';
    tr.innerHTML = `
      <td>${esc(c.type || '—')}</td>
      <td style="font-weight:600;">${esc(c.subject || '—')}</td>
      <td style="font-weight:600;">${esc(c.object || '—')}</td>
      <td><span class="badge ${statusClass}">${esc(c.status || '—')}</span></td>
      <td style="color:var(--text-muted);font-size:0.78rem;">${esc(c.description || '')}</td>`;
    tbody.appendChild(tr);
  });
}
function filterClaims() {
  const q = document.getElementById('claimSearch').value.toLowerCase();
  const docSelection = document.getElementById('globalDocFilter').value;
  
  const filtered = allClaims.filter(c => {
    const matchesSearch = (c.type||'').toLowerCase().includes(q) ||
                          (c.description||'').toLowerCase().includes(q) ||
                          (c.subject||'').toLowerCase().includes(q);
    const matchesDoc = !docSelection || c.document_id === docSelection;
    return matchesSearch && matchesDoc;
  });
  
  setCount('claims', filtered.length);
  drawClaimTable(filtered);
}

document.getElementById('claimSearch').addEventListener('input', filterClaims);

/* ── Communities ──────────────────────────────────────────────── */
function renderCommunities(communities) {
  const list = communities || [];
  setCount('communities', list.length);
  const empty   = document.getElementById('commEmpty');
  const content = document.getElementById('commContent');
  const grid    = document.getElementById('commList');
  if (!list.length) { empty.style.display=''; content.style.display='none'; return; }
  empty.style.display = 'none'; content.style.display = 'block';
  grid.innerHTML = '';
  list.forEach(c => {
    const card     = document.createElement('div');
    card.className = 'comm-card';
    const entities = c.entities || [];
    const chips    = entities.map(e => `<span class="entity-chip">${esc(e.name)}</span>`).join('');
    const summary  = c.summary ? `<p class="comm-summary">${esc(c.summary)}</p>` : '';
    card.innerHTML = `
      <div class="comm-header">
        <div class="comm-title">${esc(c.title || 'Community')}</div>
        <div class="comm-meta">Level ${c.level ?? '?'} · ${entities.length} entities</div>
        <div class="comm-arrow">▼</div>
      </div>
      <div class="comm-body">
        ${summary}
        <div class="entity-chips">${chips || '<span style="color:var(--text-muted);font-size:.8rem;">No entities</span>'}</div>
      </div>`;
    card.querySelector('.comm-header').addEventListener('click', () => card.classList.toggle('open'));
    grid.appendChild(card);
  });
}

/* ── Utils ────────────────────────────────────────────────────── */
function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* Auto-load on page open */
loadData();
</script>
</body>
</html>
