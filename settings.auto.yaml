### Auto-tuned companion config for this repository.
### Generate prompts first with ./auto_tune.sh, then index with:
###   GRAPHRAG_CONFIG=settings.auto.yaml ./update_graph.sh
### or launch the frontend with:
###   GRAPHRAG_CONFIG=settings.auto.yaml python3 frontend/app.py

models:
  default_chat_model:
    type: chat
    model_provider: openai
    auth_type: api_key
    api_key: ${GRAPHRAG_API_KEY}
    model: gpt-4o-mini
    model_supports_json: true
    concurrent_requests: 25
    async_mode: threaded
    retry_strategy: exponential_backoff
    max_retries: 10
    tokens_per_minute: null
    requests_per_minute: null
  default_embedding_model:
    type: embedding
    model_provider: openai
    auth_type: api_key
    api_key: ${GRAPHRAG_API_KEY}
    model: text-embedding-3-small
    concurrent_requests: 25
    async_mode: threaded
    retry_strategy: exponential_backoff
    max_retries: 10
    tokens_per_minute: null
    requests_per_minute: null

input:
  storage:
    type: file
    base_dir: "input"
  file_type: text

chunks:
  size: 3000
  overlap: 300
  group_by_columns: [id]

output:
  type: file
  base_dir: "output_auto"

cache:
  type: file
  base_dir: "cache_auto"

reporting:
  type: file
  base_dir: "logs_auto"

vector_store:
  default_vector_store:
    type: lancedb
    db_uri: output_auto/lancedb
    container_name: default

embed_text:
  model_id: default_embedding_model
  vector_store_id: default_vector_store

extract_graph:
  model_id: default_chat_model
  prompt: "prompts_auto/extract_graph.txt"
  entity_types: [organization,person,geo,event,product,technology]
  max_gleanings: 2

summarize_descriptions:
  model_id: default_chat_model
  prompt: "prompts_auto/summarize_descriptions.txt"
  max_length: 500

extract_graph_nlp:
  text_analyzer:
    extractor_type: regex_english
  async_mode: threaded

cluster_graph:
  max_cluster_size: 10

extract_claims:
  enabled: true
  model_id: default_chat_model
  prompt: "prompts/extract_claims.txt"
  description: "Any claims or facts that could be relevant to information discovery."
  max_gleanings: 1

community_reports:
  model_id: default_chat_model
  graph_prompt: "prompts_auto/community_report_graph.txt"
  text_prompt: "prompts/community_report_text.txt"
  max_length: 2000
  max_input_length: 8000

embed_graph:
  enabled: true

umap:
  enabled: true

snapshots:
  graphml: true
  embeddings: true

local_search:
  chat_model_id: default_chat_model
  embedding_model_id: default_embedding_model
  prompt: "prompts/local_search_system_prompt.txt"

global_search:
  chat_model_id: default_chat_model
  map_prompt: "prompts/global_search_map_system_prompt.txt"
  reduce_prompt: "prompts/global_search_reduce_system_prompt.txt"
  knowledge_prompt: "prompts/global_search_knowledge_system_prompt.txt"

drift_search:
  chat_model_id: default_chat_model
  embedding_model_id: default_embedding_model
  prompt: "prompts/drift_search_system_prompt.txt"
  reduce_prompt: "prompts/drift_reduce_prompt.txt"

basic_search:
  chat_model_id: default_chat_model
  embedding_model_id: default_embedding_model
  prompt: "prompts/basic_search_system_prompt.txt"
